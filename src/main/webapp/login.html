<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediBook - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">🏥 MediBook</a>
      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse" data-bs-target="#mynavbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mynavbar">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">HOME</a></li>
          <li class="nav-item"><a class="nav-link" href="aboutus.html">ABOUT US</a></li>
          <li class="nav-item"><a class="nav-link" href="#">CONTACT</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-4">

        <div class="card p-4 shadow-sm">
          <h4 class="text-center mb-3 fw-bold">🏥 MediBook Login</h4>

          <!-- ✅ Message box — shown for error or success -->
          <div id="msgBox" class="d-none mb-3"></div>

          <form action="Authenticate" method="post">

            <!-- Hidden fields for redirect-after-login -->
            <input type="hidden" name="redirect"
              id="redirectField" value="">
            <input type="hidden" name="docId"
              id="docIdField" value="">

            <!-- Role Selector -->
            <div class="mb-3">
              <label class="form-label fw-bold">Login As:</label>
              <div>
                <input type="radio" name="role" value="user" checked>
                &nbsp;User
                &nbsp;&nbsp;
                <input type="radio" name="role" value="admin">
                &nbsp;Admin
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Email:</label>
              <input type="email" class="form-control"
                placeholder="Enter email" name="email" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password:</label>
              <input type="password" class="form-control"
                placeholder="Enter password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold">
              Login
            </button>
          </form>

          <hr>
          <p class="text-center mb-0">
            Don't have an account? <a href="signup.html">Register</a>
          </p>
          <p class="text-center mt-2">
            <a href="reset.html">Forgot Password?</a>
          </p>
        </div>

      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const msgBox = document.getElementById('msgBox');

    // ✅ Show error message
    if (params.get('error') === '1') {
      msgBox.className = 'alert alert-danger text-center';
      msgBox.innerText = '❌ Invalid email or password. Please try again.';
    }

    // ✅ Show success message after registration
    if (params.get('registered') === '1') {
      msgBox.className = 'alert alert-success text-center';
      msgBox.innerText = '✅ Account created successfully! Please login.';
    }

    // ✅ Pass redirect and docId params through to servlet
    const redirect = params.get('redirect');
    const docId    = params.get('docId');
    if (redirect) {
      document.getElementById('redirectField').value = redirect;
    }
    if (docId) {
      document.getElementById('docIdField').value = docId;
    }
  </script>

</body>
</html>
