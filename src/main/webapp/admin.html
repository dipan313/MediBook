<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediBook - Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body { background-color: #f8f9fa; }
    .section-title {
      font-weight: 600;
      border-left: 4px solid #0d6efd;
      padding-left: 10px;
      margin-bottom: 20px;
    }
    .section-title.danger { border-left-color: #dc3545; }
    #toast-container {
      position: fixed; bottom: 20px; right: 20px; z-index: 9999;
    }
    .table td, .table th { vertical-align: middle; }
    .edit-input { min-width: 80px; }
  </style>
</head>
<body>

  <!-- ✅ Navbar -->
  <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">🏥 MediBook</a>
      <ul class="navbar-nav ms-auto" id="navRight"></ul>
    </div>
  </nav>

  <div class="container mt-4 mb-5">

    <!-- ✅ Add Doctor Form -->
    <div class="card shadow-sm mb-5">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">➕ Add New Doctor</h5>
      </div>
      <div class="card-body">
        <form id="addDoctorForm">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Doctor Name</label>
              <input type="text" id="f-name" class="form-control"
                placeholder="e.g. Dr. Arjun Sen" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Specialization</label>
              <input type="text" id="f-spec" class="form-control"
                placeholder="e.g. Cardiologist" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Experience (years)</label>
              <input type="number" id="f-exp" class="form-control"
                placeholder="e.g. 10" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Hospital / Clinic</label>
              <input type="text" id="f-hospital" class="form-control"
                placeholder="e.g. Apollo Hospital" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Consultation Fees (₹)</label>
              <input type="number" step="0.01" id="f-fees"
                class="form-control" placeholder="e.g. 500" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Availability</label>
              <input type="text" id="f-availability" class="form-control"
                placeholder="e.g. Mon-Fri 10am-5pm" required>
            </div>
            <div class="col-md-8">
              <label class="form-label">
                Photo URL <span class="text-muted">(optional)</span>
              </label>
              <input type="text" id="f-photo" class="form-control"
                placeholder="https://example.com/photo.jpg">
            </div>
            <div class="col-md-4 d-flex align-items-end">
              <button type="submit"
                class="btn btn-success w-100">Add Doctor</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- ✅ Active Doctors Table -->
    <h5 class="section-title">🩺 Existing Doctors</h5>
    <div class="card shadow-sm mb-5">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead class="table-dark">
              <tr>
                <th>#</th><th>Name</th><th>Specialization</th>
                <th>Exp</th><th>Hospital</th><th>Fees</th>
                <th>Availability</th><th>Photo URL</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="activeDoctorsTable">
              <tr>
                <td colspan="9" class="text-center text-muted py-4">
                  Loading...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ✅ Deleted Doctors Table -->
    <div id="deletedSection" class="d-none">
      <h5 class="section-title danger">🗑️ Deleted Doctors</h5>
      <div class="card shadow-sm">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead class="table-danger">
                <tr>
                  <th>#</th><th>Name</th>
                  <th>Specialization</th>
                  <th>Hospital</th><th>Action</th>
                </tr>
              </thead>
              <tbody id="deletedDoctorsTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- ✅ Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-4">
    <p class="mb-0">&copy; 2026 MediBook Admin Panel</p>
  </footer>

  <!-- ✅ Toast -->
  <div id="toast-container">
    <div id="appToast"
      class="toast align-items-center text-white border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body fw-bold" id="toastMsg">Done!</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto"
          data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script>

    // ── Toast ────────────────────────────────────────────────────
    function showToast(msg, type = 'success') {
      const toast = document.getElementById('appToast');
      toast.className =
        `toast align-items-center text-white border-0 bg-${type}`;
      document.getElementById('toastMsg').innerText = msg;
      new bootstrap.Toast(toast, { delay: 3000 }).show();
    }

    // ── Load all doctors ─────────────────────────────────────────
    function loadDoctors() {
      fetch('AdminDoctor?action=getAll')
        .then(res => res.json())
        .then(data => {
          renderActiveTable(data.active);
          renderDeletedTable(data.deleted);
        })
        .catch(() => showToast('Failed to load doctors', 'danger'));
    }

    // ── Render active table ──────────────────────────────────────
    function renderActiveTable(doctors) {
      const tbody = document.getElementById('activeDoctorsTable');
      if (doctors.length === 0) {
        tbody.innerHTML = `<tr>
          <td colspan="9" class="text-center text-muted py-4">
            No active doctors found.
          </td></tr>`;
        return;
      }
      tbody.innerHTML = doctors.map(doc => `
        <tr id="row-${doc.id}">
          <td>${doc.id}</td>
          <td>
            <span id="view-${doc.id}-name">${doc.name}</span>
            <input id="edit-${doc.id}-name"
              class="form-control form-control-sm edit-input d-none"
              value="${doc.name}">
          </td>
          <td>
            <span id="view-${doc.id}-spec">${doc.specialization}</span>
            <input id="edit-${doc.id}-spec"
              class="form-control form-control-sm edit-input d-none"
              value="${doc.specialization}">
          </td>
          <td>
            <span id="view-${doc.id}-exp">${doc.experience}</span>
            <input id="edit-${doc.id}-exp" type="number"
              class="form-control form-control-sm edit-input d-none"
              value="${doc.experience}">
          </td>
          <td>
            <span id="view-${doc.id}-hospital">${doc.hospital}</span>
            <input id="edit-${doc.id}-hospital"
              class="form-control form-control-sm edit-input d-none"
              value="${doc.hospital}">
          </td>
          <td>
            <span id="view-${doc.id}-fees">${doc.fees}</span>
            <input id="edit-${doc.id}-fees" type="number" step="0.01"
              class="form-control form-control-sm edit-input d-none"
              value="${doc.fees}">
          </td>
          <td>
            <span id="view-${doc.id}-avail">${doc.availability}</span>
            <input id="edit-${doc.id}-avail"
              class="form-control form-control-sm edit-input d-none"
              value="${doc.availability}">
          </td>
          <td>
            <span id="view-${doc.id}-photo">${doc.photo_url}</span>
            <input id="edit-${doc.id}-photo"
              class="form-control form-control-sm edit-input d-none"
              value="${doc.photo_url}">
          </td>
          <td>
            <button class="btn btn-warning btn-sm mb-1"
              onclick="enableEdit(${doc.id})"
              id="editBtn-${doc.id}">Edit</button>
            <button class="btn btn-success btn-sm mb-1 d-none"
              onclick="saveEdit(${doc.id})"
              id="saveBtn-${doc.id}">Save</button>
            <button class="btn btn-danger btn-sm"
              onclick="softDelete(${doc.id})">Delete</button>
          </td>
        </tr>`).join('');
    }

    // ── Render deleted table ─────────────────────────────────────
    function renderDeletedTable(doctors) {
      const section = document.getElementById('deletedSection');
      const tbody   = document.getElementById('deletedDoctorsTable');
      if (doctors.length === 0) {
        section.classList.add('d-none');
        return;
      }
      section.classList.remove('d-none');
      tbody.innerHTML = doctors.map(doc => `
        <tr>
          <td>${doc.id}</td>
          <td>${doc.name}</td>
          <td>${doc.specialization}</td>
          <td>${doc.hospital}</td>
          <td>
            <button class="btn btn-success btn-sm"
              onclick="restoreDoctor(${doc.id})">Restore</button>
          </td>
        </tr>`).join('');
    }

    // ── Enable inline edit ───────────────────────────────────────
    function enableEdit(id) {
      ['name','spec','exp','hospital','fees','avail','photo'].forEach(f => {
        document.getElementById(`view-${id}-${f}`).classList.add('d-none');
        document.getElementById(`edit-${id}-${f}`).classList.remove('d-none');
      });
      document.getElementById(`editBtn-${id}`).classList.add('d-none');
      document.getElementById(`saveBtn-${id}`).classList.remove('d-none');
    }

    // ── Save inline edit ─────────────────────────────────────────
    function saveEdit(id) {
      const body = new URLSearchParams();
      body.append('action',         'update');
      body.append('id',             id);
      body.append('name',           document.getElementById(`edit-${id}-name`).value);
      body.append('specialization', document.getElementById(`edit-${id}-spec`).value);
      body.append('experience',     document.getElementById(`edit-${id}-exp`).value);
      body.append('hospital',       document.getElementById(`edit-${id}-hospital`).value);
      body.append('fees',           document.getElementById(`edit-${id}-fees`).value);
      body.append('availability',   document.getElementById(`edit-${id}-avail`).value);
      body.append('photo_url',      document.getElementById(`edit-${id}-photo`).value);

      fetch('AdminDoctor', { method: 'POST', body })
        .then(res => res.json())
        .then(data => {
          if (data.status === 'updated') {
            showToast('Doctor updated!', 'success');
            loadDoctors();
          } else {
            showToast('Update failed!', 'danger');
          }
        });
    }

    // ── Add doctor ───────────────────────────────────────────────
    document.getElementById('addDoctorForm')
      .addEventListener('submit', function(e) {
        e.preventDefault();
        const body = new URLSearchParams();
        body.append('action',         'insert');
        body.append('name',           document.getElementById('f-name').value);
        body.append('specialization', document.getElementById('f-spec').value);
        body.append('experience',     document.getElementById('f-exp').value);
        body.append('hospital',       document.getElementById('f-hospital').value);
        body.append('fees',           document.getElementById('f-fees').value);
        body.append('availability',   document.getElementById('f-availability').value);
        body.append('photo_url',      document.getElementById('f-photo').value);

        fetch('AdminDoctor', { method: 'POST', body })
          .then(res => res.json())
          .then(data => {
            if (data.status === 'inserted') {
              showToast('Doctor added!', 'success');
              document.getElementById('addDoctorForm').reset();
              loadDoctors();
            } else {
              showToast('Insert failed!', 'danger');
            }
          });
      });

    // ── Soft delete ──────────────────────────────────────────────
    function softDelete(id) {
      if (!confirm('Soft delete this doctor?')) return;
      fetch(`AdminDoctor?action=delete&id=${id}`)
        .then(res => res.json())
        .then(data => {
          if (data.status === 'deleted') {
            showToast('Doctor removed.', 'warning');
            loadDoctors();
          }
        });
    }

    // ── Restore ──────────────────────────────────────────────────
    function restoreDoctor(id) {
      fetch(`AdminDoctor?action=restore&id=${id}`)
        .then(res => res.json())
        .then(data => {
          if (data.status === 'restored') {
            showToast('Doctor restored!', 'success');
            loadDoctors();
          }
        });
    }

    // ── Navbar session ───────────────────────────────────────────
    fetch('GetSession')
      .then(res => res.json())
      .then(data => {
        const navRight = document.getElementById('navRight');
        if (data.loggedIn) {
          navRight.innerHTML = `
            <li class="nav-item d-flex align-items-center me-3">
              <span class="text-white">
                👤 <b>${data.name}</b>
                <span class="badge bg-${data.role === 'admin'
                  ? 'danger' : 'success'} ms-1">
                  ${data.role.toUpperCase()}
                </span>
              </span>
            </li>
            <li class="nav-item">
              <a class="nav-link text-danger fw-bold"
                href="Logout">Logout</a>
            </li>`;
        } else {
          navRight.innerHTML = `
            <li class="nav-item">
              <a class="nav-link" href="login.html">Login</a>
            </li>`;
        }
      }).catch(() => {});

    // ── Load on open ─────────────────────────────────────────────
    window.onload = loadDoctors;

  </script>

</body>
</html>
